{{ define "main" }}
<style>
    .meetups-header {
        margin-bottom: 48px;
    }

    .meetups-header h1 {
        font-size: 48px;
        font-weight: 600;
        line-height: 1.2;
        margin-bottom: 16px;
        letter-spacing: -0.02em;
    }

    .meetups-header p {
        font-size: 18px;
        color: var(--text-secondary);
    }

    .events-timeline {
        position: relative;
    }

    .event-item {
        display: flex;
        gap: 32px;
        margin-bottom: 48px;
        cursor: pointer;
        padding: 24px;
        border-radius: 8px;
        transition: all 0.2s;
        border: 1px solid transparent;
        text-decoration: none;
        color: var(--text-primary);
    }

    .event-item:hover {
        background: var(--hover-bg);
        border-color: var(--border);
    }

    .event-date {
        flex-shrink: 0;
        width: 140px;
        padding-top: 4px;
    }

    .event-date-day {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 4px;
    }

    .event-date-year {
        font-size: 13px;
        color: var(--text-secondary);
    }

    .event-content {
        flex: 1;
    }

    .event-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        line-height: 1.3;
    }

    .event-meta {
        display: flex;
        gap: 16px;
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 12px;
    }

    .event-excerpt {
        font-size: 15px;
        color: var(--text-secondary);
        line-height: 1.6;
    }

    .event-cover {
        width: 200px;
        height: 120px;
        object-fit: cover;
        border-radius: 6px;
        flex-shrink: 0;
    }

    @media (max-width: 768px) {
        .meetups-header h1 {
            font-size: 36px;
        }

        .meetups-header p {
            font-size: 16px;
        }

        .event-item {
            flex-direction: column;
            gap: 16px;
        }

        .event-date {
            width: 100%;
        }

        .event-cover {
            width: 100%;
            height: 180px;
        }
    }
</style>

<div class="meetups-header">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
</div>

<div class="events-timeline">
    {{ range .Pages.Reverse }}
    <a href="{{ .RelPermalink }}" class="event-item">
        <div class="event-date">
            <div class="event-date-day">{{ .Date.Format "Jan 2" }}</div>
            <div class="event-date-year">{{ .Date.Format "2006" }}</div>
        </div>
        <div class="event-content">
            <h3 class="event-title">{{ .Title }}</h3>
            <div class="event-meta">
                <span>{{ .Params.venue_name }}</span>
                <span>{{ .Params.going_count }} attendees</span>
            </div>
            <p class="event-excerpt">{{ .Plain | truncate 150 }}</p>
        </div>
        {{ if .Params.cover_image }}
        <img src="{{ .Params.cover_image | strings.TrimPrefix "/" | relURL }}" alt="{{ .Title }}" class="event-cover">
        {{ end }}
    </a>
    {{ end }}
</div>
{{ end }}
